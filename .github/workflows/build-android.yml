name: Build AI Video Studio (Android .apk)

on:
  push:
    paths:
      - "mobile/**"
      - "main.py"
      - "buildozer.spec"
      - "ai_video_studio/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Builds the APK with Buildozer (downloads the Android SDK/NDK on first run).
      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIVideoStudio-APK
          path: ${{ steps.buildozer.outputs.filename }}
