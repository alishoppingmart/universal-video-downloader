name: Daily auto-publish (cloud scheduler)

# Runs in the cloud on a schedule and publishes one video per slot.
#
# IMPORTANT: Google Flow generation generally does NOT work from GitHub's
# cloud servers (Google blocks data-center logins). So this cloud job is best
# used to PUBLISH videos that already exist, or with a generator that has a
# proper API. For Flow generation, run the desktop app on your own PC, or
# attach a self-hosted runner on your machine.
#
# Schedule below = 18:00 UTC daily. Adjust the cron, or add more lines for
# multiple posts per day. Cron is in UTC.

on:
  schedule:
    - cron: "0 18 * * *"   # once a day at 18:00 UTC
    # - cron: "0 6 * * *"  # uncomment for a second daily post at 06:00 UTC
  workflow_dispatch:
    inputs:
      topic_index:
        description: "Which topic index to use"
        default: "0"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one publish job
        env:
          # Add these under: repo Settings -> Secrets and variables -> Actions
          AVS_YT_CLIENT_ID: ${{ secrets.AVS_YT_CLIENT_ID }}
          AVS_YT_CLIENT_SECRET: ${{ secrets.AVS_YT_CLIENT_SECRET }}
          AVS_YT_REFRESH_TOKEN: ${{ secrets.AVS_YT_REFRESH_TOKEN }}
          AVS_TIKTOK_CLIENT_KEY: ${{ secrets.AVS_TIKTOK_CLIENT_KEY }}
          AVS_TIKTOK_CLIENT_SECRET: ${{ secrets.AVS_TIKTOK_CLIENT_SECRET }}
          AVS_TIKTOK_ACCESS_TOKEN: ${{ secrets.AVS_TIKTOK_ACCESS_TOKEN }}
        run: |
          python -m ai_video_studio.scripts.run_once --topic-index "${{ github.event.inputs.topic_index || 0 }}"
